name: 🔄 Update Profile on New Repository

on:
  repository:
    types: [created]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch repositories and update profile README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: ThePhoenixAgency
        run: |
          python3 - <<'PYEOF'
          import os, json, subprocess, re

          org = os.environ['ORG']

          # Fetch all public repos, paginated, sorted newest first
          result = subprocess.run(
              ['gh', 'api', f'orgs/{org}/repos',
               '--paginate',
               '--jq', '.[] | {name, description, html_url, stargazers_count, language, created_at, fork}'],
              capture_output=True, text=True, check=True
          )

          repos = [json.loads(line) for line in result.stdout.strip().splitlines() if line]
          # Exclude forks, sort by creation date descending (newest first)
          repos = [r for r in repos if not r.get('fork')]
          repos.sort(key=lambda r: r['created_at'], reverse=True)

          # Build markdown table
          rows = [
              '| 📁 Repository | 📝 Description | ⭐ Stars | 🔤 Language |',
              '|:---|:---|:---:|:---:|',
          ]
          for r in repos:
              name = r['name']
              url  = r['html_url']
              desc = (r.get('description') or '—').replace('|', '\\|')
              stars = r.get('stargazers_count', 0)
              lang  = r.get('language') or '—'
              rows.append(f'| [**{name}**]({url}) | {desc} | {stars} | {lang} |')

          table = '\n'.join(rows)

          # Inject table between markers
          with open('profile/README.md', 'r') as f:
              content = f.read()

          updated = re.sub(
              r'<!-- AUTO-REPOS-START -->.*?<!-- AUTO-REPOS-END -->',
              f'<!-- AUTO-REPOS-START -->\n{table}\n<!-- AUTO-REPOS-END -->',
              content,
              flags=re.DOTALL
          )

          with open('profile/README.md', 'w') as f:
              f.write(updated)

          print(f"✅ Profile updated with {len(repos)} repositories.")
          PYEOF

      - name: Auto-commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 chore: update profile with latest repositories [skip ci]"
            git push
            echo "✅ Profile README committed and pushed."
          fi
